name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run icons:check
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx --no-install electron-builder --win nsis portable
      - run: node scripts/verify-package.cjs --artifacts --dir release
      - run: npm run checksums
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: chwezi-markdown-reader-windows-x64
          path: |
            release/*.exe
            release/SHA256SUMS-windows.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  macos:
    name: macOS Intel and Apple Silicon
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run icons:check
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx --no-install electron-builder --mac
      - run: node scripts/verify-package.cjs --artifacts --dir release
      - run: npm run checksums
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: chwezi-markdown-reader-macos
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS-macos.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
