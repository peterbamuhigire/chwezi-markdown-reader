name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:win
      - uses: actions/upload-artifact@v7
        with:
          name: chwezi-markdown-reader-windows-x64
          path: release/*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  macos:
    name: macOS Intel and Apple Silicon
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v7
        with:
          name: chwezi-markdown-reader-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
